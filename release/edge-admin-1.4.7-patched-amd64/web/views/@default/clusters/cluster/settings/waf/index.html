{$layout}
{$template "../menu"}

<div class="left-right-box-container">
    {$template "/left_menu"}

    <div class="right-box">
        <form class="ui form" method="post" data-tea-action="$" data-tea-success="success">
            <csrf-token></csrf-token>
            <input type="hidden" name="clusterId" :value="clusterId"/>
            <table class="ui table definition selectable">
                <tr v-show="!isGlobal">
                    <td class="title">使用全局配置</td>
                    <td>
                        <checkbox name="useGlobal" v-model="useGlobal"></checkbox>
                        <p class="comment">确定当前配置是否使用全局集群配置，勾选表面当前使用全局配置，否则使用自定义配置。</p>
                    </td>
                </tr>
                <tr>
                    <td class="title">选择WAF策略 </td>
                    <td>
                        <http-firewall-policy-selector :v-http-firewall-policy="firewallPolicy"></http-firewall-policy-selector>
                        <p class="comment">部署在当前集群上的所有网站都会自动使用此策略，只是网站可以自定义是否开启。</p>
                    </td>
                </tr>
            </table>
            <submit-btn></submit-btn>
        </form>
    </div>
</div>
