{$layout}
{$template "menu"}

<div v-if="teaIsPlus">
    <div class="ui message success icon">
        <i class="icon gem outline small yellow"></i>
        <div class="content">
            当前系统已授权，无需再次激活。
        </div>
    </div>

    <b-status-card>
        <b-status-card-item label="状态">
            <span class="green">已授权</span>
        </b-status-card-item>
        <b-status-card-item label="版本">
            Enterprise Unlimited
        </b-status-card-item>
        <b-status-card-item label="节点数限制">
            无限制
        </b-status-card-item>
        <b-status-card-item label="开通组件">
            所有组件
        </b-status-card-item>
        <b-status-card-item label="结束日期">
            <span class="green">终身授权</span>
        </b-status-card-item>
    </b-status-card>
</div>

<form v-else data-tea-action="$" data-tea-success="success" data-tea-before="before" data-tea-done="done" data-tea-timeout="1800" spellcheck="false">
    <csrf-token></csrf-token>
    <b-status-card>
        <b-status-card-item label="注册码 *" span="full" :comment="[
            '请输入商业版/企业版注册码。',
        ]">
            <textarea style="width:100%; border-radius: .5em;" rows="8" name="key" ref="focus"></textarea>
        </b-status-card-item>
    </b-status-card>
    
    <div class="margin"></div>
    <submit-btn v-show="!isRequesting">激活</submit-btn>
    <button class="ui button disabled" v-show="isRequesting">激活中...</button>
</form>
