{$layout}
{$template "../menu"}

<div class="left-right-box-container">
    {$template "/left_menu"}

    <div class="right-box">
        <first-menu>
            <menu-item :href="'.?clusterId=' + clusterId" class="active">设置</menu-item>
            <menu-item :href="'.status?clusterId=' + clusterId" >状态</menu-item>
        </first-menu>

        <form class="ui form" data-tea-action="$" data-tea-success="success">
            <csrf-token></csrf-token>
            <input type="hidden" name="clusterId" :value="clusterId"/>
            <table class="ui table definition selectable">
            <tr v-show="!isGlobal">
                <td class="title">使用全局配置</td>
                <td>
                    <checkbox name="useGlobal" v-model="useGlobal"></checkbox>
                    <p class="comment">确定当前配置是否使用全局集群配置，勾选表面当前使用全局配置，否则使用自定义配置。</p>
                </td>
            </tr>
            </table>
            <node-ddos-protection-config-box :v-ddos-protection-config="config" :v-default-configs="defaultConfigs"></node-ddos-protection-config-box>

            <submit-btn></submit-btn>
        </form>
    </div>
</div>
