{$layout}
{$template "../menu"}

<div class="left-right-box-container">
    {$template "/left_menu"}

    <div class="right-box">
        {$template "menu"}

        <form method="post" class="ui form" data-tea-action="$" data-tea-success="success" id="xform">
            <input type="hidden" name="clusterId" :value="clusterId"/>
            <csrf-token></csrf-token>

            <table class="ui table definition selectable">
                <tr v-show="!isGlobal">
                    <td class="title">使用全局配置</td>
                    <td>
                        <checkbox name="useGlobal" v-model="useGlobal"></checkbox>
                        <p class="comment">确定当前配置是否使用全局集群配置，勾选表面当前使用全局配置，否则使用自定义配置。</p>
                    </td>
                </tr>
                <tr>
                    <td class="title">自动加入Systemd服务</td>
                    <td>
                        <checkbox name="systemdIsOn" v-model="systemdIsOn"></checkbox>
                        <p class="comment">加入后可以利用systemd对节点进程进行管理，并可自动随开机启动。</p>
                    </td>
                </tr>
            </table>

            <submit-btn></submit-btn>
        </form>
    </div>
</div>
