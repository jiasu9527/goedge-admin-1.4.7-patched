{$layout}
{$template "../menu"}

<div class="left-right-box-container">
    {$template "/left_menu"}

    <div class="right-box">
        <form class="ui form" data-tea-action="$" data-tea-success="success">
            <csrf-token></csrf-token>
            <input type="hidden" name="clusterId" :value="clusterId"/>

            <table class="ui table selectable definition">
                <tr v-show="!isGlobal">
                    <td class="title">使用全局配置</td>
                    <td>
                        <checkbox name="useGlobal" v-model="useGlobal"></checkbox>
                        <p class="comment">确定当前配置是否使用全局集群配置，勾选表面当前使用全局配置，否则使用自定义配置。</p>
                    </td>
                </tr>
                <tr>
                    <td class="title">消息接收人</td>
                    <td>
                        <message-receivers-box :v-node-cluster-id="clusterId"></message-receivers-box>
                    </td>
                </tr>
            </table>

            <submit-btn></submit-btn>
        </form>
    </div>
</div>
